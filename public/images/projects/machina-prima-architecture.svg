<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1000" height="350" fill="#0a0a0f" rx="0"/>

  <!-- Pipeline boxes -->
  <!-- 1. Hand-Drawn Sketches -->
  <rect x="15" y="40" width="150" height="85" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="90" y="68" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Hand-Drawn</text>
  <text x="90" y="84" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Sketches</text>
  <text x="90" y="104" text-anchor="middle" fill="#555" font-size="10">15 marker drawings</text>

  <!-- Arrow 1→2 -->
  <line x1="165" y1="82" x2="190" y2="82" stroke="#555" stroke-width="1.2"/>
  <polygon points="190,78 198,82 190,86" fill="#555"/>

  <!-- 2. FLUX LoRA Training -->
  <rect x="200" y="35" width="160" height="95" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="280" y="66" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">FLUX LoRA</text>
  <text x="280" y="82" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">Training</text>
  <text x="280" y="104" text-anchor="middle" fill="#555" font-size="10">Style transfer</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="82" x2="385" y2="82" stroke="#555" stroke-width="1.2"/>
  <polygon points="385,78 393,82 385,86" fill="#555"/>

  <!-- 3. AI Room Generation -->
  <rect x="395" y="35" width="155" height="95" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="472" y="66" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">AI Room</text>
  <text x="472" y="82" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Generation</text>
  <text x="472" y="104" text-anchor="middle" fill="#555" font-size="10">11 exhibit rooms</text>

  <!-- Arrow 3→4 -->
  <line x1="550" y1="82" x2="575" y2="82" stroke="#555" stroke-width="1.2"/>
  <polygon points="575,78 583,82 575,86" fill="#555"/>

  <!-- 4. World Labs API -->
  <rect x="585" y="30" width="170" height="105" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="670" y="60" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="700">World Labs API</text>
  <text x="670" y="80" text-anchor="middle" fill="#e0e0e0" font-size="10">Gaussian splatting</text>
  <text x="670" y="96" text-anchor="middle" fill="#555" font-size="10">22M Gaussians</text>

  <!-- Auto-Cleanup note -->
  <rect x="605" y="106" width="130" height="36" rx="6" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="1"/>
  <text x="670" y="120" text-anchor="middle" fill="#00d4ff" font-size="8.5" font-weight="600">Auto-Cleanup</text>
  <text x="670" y="134" text-anchor="middle" fill="#555" font-size="8">Floaters, ghost splats, blobs</text>

  <!-- Arrow 4→5 -->
  <line x1="755" y1="82" x2="780" y2="82" stroke="#555" stroke-width="1.2"/>
  <polygon points="780,78 788,82 780,86" fill="#555"/>

  <!-- 5. Interactive 3D Viewers -->
  <rect x="790" y="40" width="190" height="85" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="885" y="68" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Interactive 3D</text>
  <text x="885" y="84" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Viewers</text>
  <text x="885" y="104" text-anchor="middle" fill="#555" font-size="10">Web-embedded</text>

  <!-- Bottom output formats -->
  <rect x="15" y="195" width="460" height="50" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="245" y="225" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="600">Panoramic Renders</text>

  <rect x="500" y="195" width="480" height="50" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="740" y="225" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="600">360&#xB0; Navigation</text>

  <!-- Connecting lines to output -->
  <line x1="400" y1="135" x2="245" y2="195" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="135" x2="740" y2="195" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="4,3"/>
</svg>