<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" font-family="system-ui, -apple-system, sans-serif">
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="350" fill="#0a0a0f"/>

  <!-- 1. Natural Language Prompt -->
  <rect x="16" y="35" width="160" height="90" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="96" y="64" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Natural Language</text>
  <text x="96" y="80" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Prompt</text>
  <text x="96" y="100" text-anchor="middle" fill="#555" font-size="9">"third-person game with</text>
  <text x="96" y="112" text-anchor="middle" fill="#555" font-size="9">dodge, jump, lock-on,</text>
  <text x="96" y="124" text-anchor="middle" fill="#555" font-size="9">mobile touch"</text>

  <!-- Arrow 1→2 -->
  <line x1="176" y1="80" x2="204" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 2. Local LLM (Ollama) -->
  <rect x="212" y="35" width="155" height="90" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="289" y="64" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">Local LLM</text>
  <text x="289" y="80" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">(Ollama)</text>
  <text x="289" y="100" text-anchor="middle" fill="#e0e0e0" font-size="10">Any model</text>
  <text x="289" y="114" text-anchor="middle" fill="#555" font-size="9">Fully offline, no API keys</text>

  <!-- Arrow 2→3 -->
  <line x1="367" y1="80" x2="395" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 3. JSON Spec Validation -->
  <rect x="403" y="35" width="160" height="90" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="483" y="64" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">JSON Spec</text>
  <text x="483" y="80" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Validation</text>
  <text x="483" y="100" text-anchor="middle" fill="#555" font-size="9">Structured output parsed</text>
  <text x="483" y="112" text-anchor="middle" fill="#555" font-size="9">and validated against</text>
  <text x="483" y="124" text-anchor="middle" fill="#555" font-size="9">UE5 constraints</text>

  <!-- Arrow 3→4 -->
  <line x1="563" y1="80" x2="591" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 4. UE5 Asset Generator -->
  <rect x="599" y="35" width="160" height="90" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="679" y="64" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">UE5 Asset</text>
  <text x="679" y="80" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Generator</text>
  <text x="679" y="100" text-anchor="middle" fill="#555" font-size="9">Input Actions, bindings,</text>
  <text x="679" y="112" text-anchor="middle" fill="#555" font-size="9">triggers, dead zones,</text>
  <text x="679" y="124" text-anchor="middle" fill="#555" font-size="9">modifiers</text>

  <!-- Arrow 4→5 -->
  <line x1="759" y1="80" x2="787" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 5. Input Action Assets -->
  <rect x="795" y="35" width="185" height="90" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="887" y="64" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">Input Action</text>
  <text x="887" y="80" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">Assets</text>
  <text x="887" y="100" text-anchor="middle" fill="#e0e0e0" font-size="10">Ready to use</text>
  <text x="887" y="114" text-anchor="middle" fill="#555" font-size="9">in Unreal Engine</text>

  <!-- Platform boxes row -->
  <text x="500" y="170" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">Multiplatform Bindings</text>

  <!-- Keyboard/Mouse -->
  <rect x="50" y="185" width="150" height="38" rx="8" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="125" y="209" text-anchor="middle" fill="#555" font-size="11">Keyboard / Mouse</text>

  <!-- Gamepad -->
  <rect x="220" y="185" width="130" height="38" rx="8" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="285" y="209" text-anchor="middle" fill="#555" font-size="11">Gamepad</text>

  <!-- iOS Touch -->
  <rect x="370" y="185" width="130" height="38" rx="8" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="435" y="209" text-anchor="middle" fill="#555" font-size="11">iOS Touch</text>

  <!-- Android Touch -->
  <rect x="520" y="185" width="150" height="38" rx="8" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="595" y="209" text-anchor="middle" fill="#555" font-size="11">Android Touch</text>

  <!-- Mac -->
  <rect x="690" y="185" width="130" height="38" rx="8" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="755" y="209" text-anchor="middle" fill="#555" font-size="11">Mac</text>

  <!-- Connecting dashed line from pipeline to platforms -->
  <line x1="500" y1="125" x2="500" y2="165" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom label -->
  <rect x="16" y="260" width="968" height="38" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="500" y="284" text-anchor="middle" fill="#555" font-size="12">Unreal Engine 5 — C++ / Slate UI — MIT License</text>
</svg>