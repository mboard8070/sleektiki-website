<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" font-family="system-ui, -apple-system, sans-serif">
  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#555"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#00d4ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="350" fill="#0a0a0f"/>

  <!-- 1. Natural Language Description -->
  <rect x="16" y="55" width="155" height="95" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="93" y="82" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Natural Language</text>
  <text x="93" y="98" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Description</text>
  <text x="93" y="118" text-anchor="middle" fill="#555" font-size="9">"12 fantasy weapons</text>
  <text x="93" y="130" text-anchor="middle" fill="#555" font-size="9">with name, damage,</text>
  <text x="93" y="142" text-anchor="middle" fill="#555" font-size="9">weight, rarity"</text>

  <!-- Arrow 1→2 -->
  <line x1="171" y1="102" x2="199" y2="102" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 2. Local LLM (Ollama) -->
  <rect x="207" y="55" width="155" height="95" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="284" y="82" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">Local LLM</text>
  <text x="284" y="98" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">(Ollama)</text>
  <text x="284" y="118" text-anchor="middle" fill="#e0e0e0" font-size="10">Schema + data gen</text>
  <text x="284" y="134" text-anchor="middle" fill="#555" font-size="9">Fully offline</text>

  <!-- Arrow 2→3 -->
  <line x1="362" y1="102" x2="390" y2="102" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 3. Schema Resolution (taller box to accommodate two inputs) -->
  <rect x="398" y="40" width="165" height="125" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="480" y="68" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Schema</text>
  <text x="480" y="84" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Resolution</text>

  <!-- AI-Defined Struct sub-box (top input) -->
  <rect x="412" y="94" width="137" height="26" rx="6" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="1"/>
  <text x="480" y="111" text-anchor="middle" fill="#555" font-size="9">AI-Defined Struct</text>

  <!-- Existing UScriptStruct sub-box (bottom input) -->
  <rect x="412" y="126" width="137" height="26" rx="6" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="1"/>
  <text x="480" y="143" text-anchor="middle" fill="#555" font-size="9">Existing UScriptStruct</text>

  <!-- Labels for the two inputs -->
  <text x="418" y="91" fill="#e0e0e0" font-size="8">from LLM</text>
  <text x="418" y="123" fill="#e0e0e0" font-size="8">from project</text>

  <!-- Arrow 3→4 -->
  <line x1="563" y1="102" x2="591" y2="102" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 4. Data Preview Table -->
  <rect x="599" y="55" width="155" height="95" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="676" y="82" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Data Preview</text>
  <text x="676" y="98" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="600">Table</text>
  <text x="676" y="118" text-anchor="middle" fill="#555" font-size="9">Review rows before</text>
  <text x="676" y="130" text-anchor="middle" fill="#555" font-size="9">committing</text>

  <!-- Arrow 4→5 -->
  <line x1="754" y1="102" x2="782" y2="102" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 5. DataTable Asset -->
  <rect x="790" y="55" width="190" height="95" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="885" y="82" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">DataTable</text>
  <text x="885" y="98" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">Asset</text>
  <text x="885" y="118" text-anchor="middle" fill="#e0e0e0" font-size="10">.uasset ready to use</text>

  <!-- Append mode label -->
  <rect x="250" y="205" width="500" height="38" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="500" y="229" text-anchor="middle" fill="#555" font-size="11">Append Mode — merge or overwrite existing DataTables</text>

  <!-- Connecting dashed line from pipeline to append bar -->
  <line x1="500" y1="165" x2="500" y2="205" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom label -->
  <rect x="16" y="275" width="968" height="38" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="500" y="299" text-anchor="middle" fill="#555" font-size="12">Unreal Engine 5 — C++ / Slate UI — MIT License</text>
</svg>