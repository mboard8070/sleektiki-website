<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="1000" height="450" font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#666" opacity="0.6"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#00d4ff" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="450" fill="#0a0a0f" rx="8"/>

  <!-- ================================================================== -->
  <!-- LEFT — DATA SOURCES -->
  <!-- ================================================================== -->

  <text x="95" y="28" fill="#555" font-size="9.5" text-anchor="middle" letter-spacing="3">DATA SOURCES</text>

  <!-- Semantic Scholar -->
  <rect x="20" y="42" width="150" height="30" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="95" y="61" fill="#e0e0e0" font-size="9.5" text-anchor="middle" font-weight="600">Semantic Scholar</text>

  <!-- arXiv -->
  <rect x="20" y="78" width="150" height="30" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="95" y="97" fill="#e0e0e0" font-size="9.5" text-anchor="middle" font-weight="600">arXiv</text>

  <!-- OpenAlex -->
  <rect x="20" y="114" width="150" height="30" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="95" y="133" fill="#e0e0e0" font-size="9.5" text-anchor="middle" font-weight="600">OpenAlex</text>

  <!-- CrossRef -->
  <rect x="20" y="150" width="150" height="30" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="95" y="169" fill="#e0e0e0" font-size="9.5" text-anchor="middle" font-weight="600">CrossRef</text>

  <!-- PubMed -->
  <rect x="20" y="186" width="150" height="30" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="95" y="205" fill="#e0e0e0" font-size="9.5" text-anchor="middle" font-weight="600">PubMed</text>

  <!-- Label below data sources -->
  <text x="95" y="232" fill="#00d4ff" font-size="8.5" text-anchor="middle">5 Academic Databases</text>

  <!-- ================================================================== -->
  <!-- CENTER — PROCESSING PIPELINE -->
  <!-- ================================================================== -->

  <text x="420" y="28" fill="#555" font-size="9.5" text-anchor="middle" letter-spacing="3">PROCESSING PIPELINE</text>

  <!-- Federated Search Engine -->
  <rect x="300" y="58" width="240" height="50" rx="6" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="420" y="78" fill="#00d4ff" font-size="11" text-anchor="middle" font-weight="700">Federated Search Engine</text>
  <text x="420" y="96" fill="#555" font-size="8" text-anchor="middle">Query all sources, deduplicate, rank</text>

  <!-- Arrow: Federated Search → LLM Analysis -->
  <line x1="420" y1="108" x2="420" y2="132" stroke="#00d4ff" stroke-width="1" opacity="0.4" marker-end="url(#arrow-cyan)"/>

  <!-- LLM Analysis -->
  <rect x="300" y="138" width="240" height="50" rx="6" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="420" y="158" fill="#00d4ff" font-size="11" text-anchor="middle" font-weight="700">LLM Analysis</text>
  <text x="420" y="176" fill="#555" font-size="8" text-anchor="middle">Structured summaries, key extraction</text>

  <!-- Arrow: LLM Analysis → Citation Graph Builder -->
  <line x1="420" y1="188" x2="420" y2="212" stroke="#00d4ff" stroke-width="1" opacity="0.4" marker-end="url(#arrow-cyan)"/>

  <!-- Citation Graph Builder -->
  <rect x="300" y="218" width="240" height="50" rx="6" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="420" y="238" fill="#00d4ff" font-size="11" text-anchor="middle" font-weight="700">Citation Graph Builder</text>
  <text x="420" y="256" fill="#555" font-size="8" text-anchor="middle">Supports, contradicts, extends</text>

  <!-- ================================================================== -->
  <!-- CONNECTION LINES: Data Sources → Federated Search -->
  <!-- ================================================================== -->

  <!-- All 5 databases converge into the federated search box -->
  <line x1="170" y1="57" x2="294" y2="72" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="170" y1="93" x2="294" y2="77" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="170" y1="129" x2="294" y2="83" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="170" y1="165" x2="294" y2="88" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="170" y1="201" x2="294" y2="93" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- API label on connection lines -->
  <text x="232" y="120" fill="#555" font-size="7.5" text-anchor="middle" font-style="italic" transform="rotate(-8, 232, 120)">REST / OAI APIs</text>

  <!-- ================================================================== -->
  <!-- RIGHT — OUTPUTS -->
  <!-- ================================================================== -->

  <text x="800" y="28" fill="#555" font-size="9.5" text-anchor="middle" letter-spacing="3">OUTPUTS</text>

  <!-- Structured Summaries -->
  <rect x="680" y="42" width="240" height="46" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="800" y="60" fill="#e0e0e0" font-size="10" text-anchor="middle" font-weight="600">Structured Summaries</text>
  <text x="800" y="77" fill="#555" font-size="7.5" text-anchor="middle">Findings, methods, gaps, conclusions</text>

  <!-- Cross-Paper Synthesis -->
  <rect x="680" y="96" width="240" height="46" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="800" y="114" fill="#e0e0e0" font-size="10" text-anchor="middle" font-weight="600">Cross-Paper Synthesis</text>
  <text x="800" y="131" fill="#555" font-size="7.5" text-anchor="middle">Themes, agreements, contradictions</text>

  <!-- Interactive Citation Graph -->
  <rect x="680" y="150" width="240" height="46" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="800" y="168" fill="#e0e0e0" font-size="10" text-anchor="middle" font-weight="600">Interactive Citation Graph</text>
  <text x="800" y="185" fill="#555" font-size="7.5" text-anchor="middle">Visual network with typed relationships</text>

  <!-- Knowledge Base -->
  <rect x="680" y="204" width="240" height="46" rx="5" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="800" y="222" fill="#e0e0e0" font-size="10" text-anchor="middle" font-weight="600">Knowledge Base</text>
  <text x="800" y="239" fill="#555" font-size="7.5" text-anchor="middle">Searchable extracted insights</text>

  <!-- ================================================================== -->
  <!-- CONNECTION LINES: Processing → Outputs -->
  <!-- ================================================================== -->

  <!-- From LLM Analysis right side to Structured Summaries & Cross-Paper Synthesis -->
  <line x1="540" y1="155" x2="674" y2="65" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="540" y1="163" x2="674" y2="119" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- From Citation Graph Builder right side to Citation Graph & Knowledge Base -->
  <line x1="540" y1="237" x2="674" y2="173" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="540" y1="247" x2="674" y2="227" stroke="#666" stroke-width="0.7" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- ================================================================== -->
  <!-- BOTTOM — EXPORT FORMATS -->
  <!-- ================================================================== -->

  <text x="800" y="274" fill="#555" font-size="9.5" text-anchor="middle" letter-spacing="3">EXPORT</text>

  <!-- Export boxes in a row -->
  <rect x="690" y="284" width="66" height="26" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="723" y="301" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">BibTeX</text>

  <rect x="767" y="284" width="66" height="26" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="800" y="301" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">JSON</text>

  <rect x="844" y="284" width="86" height="26" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="887" y="301" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">Static Website</text>

  <!-- Small connector lines from outputs to export -->
  <line x1="800" y1="250" x2="800" y2="278" stroke="#666" stroke-width="0.7" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- ================================================================== -->
  <!-- BOTTOM — TECH STACK -->
  <!-- ================================================================== -->

  <text x="420" y="335" fill="#555" font-size="9.5" text-anchor="middle" letter-spacing="3">TECHNOLOGY STACK</text>

  <!-- Tech stack bounding box -->
  <rect x="80" y="348" width="680" height="58" rx="6" fill="none" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Python -->
  <rect x="100" y="358" width="100" height="36" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="150" y="375" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">Python</text>
  <text x="150" y="388" fill="#555" font-size="7" text-anchor="middle">Core runtime</text>

  <!-- FastAPI -->
  <rect x="212" y="358" width="100" height="36" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="262" y="375" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">FastAPI</text>
  <text x="262" y="388" fill="#555" font-size="7" text-anchor="middle">API layer</text>

  <!-- NetworkX -->
  <rect x="324" y="358" width="100" height="36" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="374" y="375" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">NetworkX</text>
  <text x="374" y="388" fill="#555" font-size="7" text-anchor="middle">Graph analysis</text>

  <!-- LLM APIs -->
  <rect x="436" y="358" width="100" height="36" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="486" y="375" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">LLM APIs</text>
  <text x="486" y="388" fill="#555" font-size="7" text-anchor="middle">Claude / Mistral</text>

  <!-- SQLite -->
  <rect x="548" y="358" width="100" height="36" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="598" y="375" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">SQLite</text>
  <text x="598" y="388" fill="#555" font-size="7" text-anchor="middle">Local persistence</text>

  <!-- Jinja2 -->
  <rect x="660" y="358" width="86" height="36" rx="4" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="703" y="375" fill="#e0e0e0" font-size="9" text-anchor="middle" font-weight="600">Jinja2</text>
  <text x="703" y="388" fill="#555" font-size="7" text-anchor="middle">Site generation</text>

  <!-- ================================================================== -->
  <!-- FOOTER -->
  <!-- ================================================================== -->

  <text x="500" y="435" fill="#333" font-size="7.5" text-anchor="middle">AI-powered academic literature review -- federated search across 5 databases with LLM analysis and citation graph construction</text>

</svg>