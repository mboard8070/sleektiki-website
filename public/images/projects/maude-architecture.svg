  <line x1="602" y1="59" x2="634" y2="59" stroke="#00d4ff" stroke-width="1" opacity="0.4" marker-end="url(#arrow-cyan)"/>

  <!-- Voice protocol label -->
  <text x="550" y="93" fill="#555" font-size="7.5" text-anchor="middle" font-style="italic">WebSocket Binary Protocol (Opus in / PCM out)</text>

