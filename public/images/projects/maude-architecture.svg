    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="800" fill="#0a0a0f" rx="8"/>

  <!-- ================================================================== -->
  <!-- VOICE PIPELINE (TOP) -->
  <!-- ================================================================== -->

  <text x="550" y="28" fill="#555" font-size="9.5" text-anchor="middle" letter-spacing="3">VOICE PIPELINE</text>

  <!-- ASR box -->
  <rect x="320" y="40" width="140" height="38" rx="6" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="390" y="56" fill="#e0e0e0" font-size="10.5" text-anchor="middle" font-weight="600">Nemotron ASR</text>
  <text x="390" y="69" fill="#555" font-size="8" text-anchor="middle">0.6B params</text>

  <!-- TTS box -->
  <rect x="640" y="40" width="140" height="38" rx="6" fill="#111116" stroke="#1a1a2e" stroke-width="1"/>
  <text x="710" y="56" fill="#e0e0e0" font-size="10.5" text-anchor="middle" font-weight="600">Magpie TTS</text>
  <text x="710" y="69" fill="#555" font-size="8" text-anchor="middle">357M params</text>

  <!-- ASR → Gateway arrow -->
  <line x1="460" y1="59" x2="498" y2="59" stroke="#00d4ff" stroke-width="1" opacity="0.4" marker-end="url(#arrow-cyan)"/>

