<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1000" height="350" fill="#0a0a0f" rx="0"/>

  <!-- Pipeline boxes -->
  <!-- 1. Training Dataset -->
  <rect x="30" y="55" width="155" height="80" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="107" y="88" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Training Dataset</text>
  <text x="107" y="108" text-anchor="middle" fill="#555" font-size="10">Artist's paintings</text>

  <!-- Arrow 1→2 -->
  <line x1="185" y1="95" x2="215" y2="95" stroke="#555" stroke-width="1.2"/>
  <polygon points="215,91 223,95 215,99" fill="#555"/>

  <!-- 2. Auto-Captioning -->
  <rect x="225" y="55" width="145" height="80" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="297" y="88" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Auto-Captioning</text>
  <text x="297" y="108" text-anchor="middle" fill="#555" font-size="10">Description generation</text>

  <!-- Arrow 2→3 -->
  <line x1="370" y1="95" x2="400" y2="95" stroke="#555" stroke-width="1.2"/>
  <polygon points="400,91 408,95 400,99" fill="#555"/>

  <!-- 3. FLUX LoRA Training -->
  <rect x="410" y="45" width="175" height="100" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="497" y="78" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="700">FLUX LoRA Training</text>
  <text x="497" y="98" text-anchor="middle" fill="#e0e0e0" font-size="10">DGX Spark</text>
  <text x="497" y="114" text-anchor="middle" fill="#555" font-size="10">CUDA accelerated</text>

  <!-- Arrow 3→4 -->
  <line x1="585" y1="95" x2="615" y2="95" stroke="#555" stroke-width="1.2"/>
  <polygon points="615,91 623,95 615,99" fill="#555"/>

  <!-- 4. Checkpoint Evaluation -->
  <rect x="625" y="55" width="165" height="80" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="707" y="82" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Checkpoint</text>
  <text x="707" y="98" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Evaluation</text>
  <text x="707" y="118" text-anchor="middle" fill="#555" font-size="10">Side-by-side comparison</text>

  <!-- Arrow 4→5 -->
  <line x1="790" y1="95" x2="820" y2="95" stroke="#555" stroke-width="1.2"/>
  <polygon points="820,91 828,95 820,99" fill="#555"/>

  <!-- 5. Trained Model -->
  <rect x="830" y="55" width="140" height="80" rx="10" fill="#111116" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="900" y="88" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="600">Trained Model</text>
  <text x="900" y="108" text-anchor="middle" fill="#555" font-size="10">Custom LoRA weights</text>

  <!-- Gradio Interface bar -->
  <rect x="30" y="185" width="940" height="65" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="500" y="214" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Gradio Interface</text>
  <text x="500" y="234" text-anchor="middle" fill="#555" font-size="11">Artist-friendly controls &#x2014; no ML expertise required</text>

  <!-- Connecting lines from pipeline to Gradio -->
  <line x1="500" y1="145" x2="500" y2="185" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom hardware bar -->
  <rect x="30" y="280" width="940" height="45" rx="10" fill="#111116" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="500" y="308" text-anchor="middle" fill="#555" font-size="12" font-weight="500">NVIDIA DGX Spark &#x2014; GB10 Blackwell GPU</text>
</svg>